name: gkjw_karangpilang
description: "Aplikasi Resmi GKJW Jemaat Karangpilang"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  firebase_storage: ^12.4.4
  cloud_firestore: ^5.6.6

  # Supabase
  supabase_flutter: ^2.9.0

  # UI & Navigation
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # PDF Viewer
  flutter_pdfview: ^1.3.2
  dio: ^5.8.0+1
  path_provider: ^2.1.5
  open_filex: ^4.6.0

  # Video
  youtube_player_flutter: ^9.1.1
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  lottie: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  permission_handler: ^11.4.0

  # Spin Wheel
  flutter_fortune_wheel: ^1.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.3
  timezone: ^0.9.4

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  youtube_explode_dart: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
